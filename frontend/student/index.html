<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Minha Área — FitFlow Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22C55E;
      --green-dark: #15803D;
      --orange: #F97316;
      --gray-900: #0F172A;
      --gray-600: #475569;
      --gray-400: #94A3B8;
      --gray-200: #E2E8F0;
      --gray-100: #F1F5F9;
      --gray-50:  #F8FAFC;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    #header {
      background: #fff;
      border-bottom: 1px solid var(--gray-100);
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .header-inner {
      max-width: 480px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .trainer-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .trainer-avatar-init {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--green); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .header-trainer { font-size: 11px; color: var(--gray-400); }
    .header-brand {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 800; color: var(--gray-900);
    }

    /* ── Hero de saudação ── */
    #hero {
      background: linear-gradient(135deg, #15803D 0%, #22C55E 100%);
      padding: 28px 20px 36px;
    }
    .hero-inner { max-width: 480px; margin: 0 auto; }
    .hero-greeting {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.8); margin-bottom: 4px;
    }
    .hero-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px; font-weight: 800;
      color: #fff; margin-bottom: 18px; line-height: 1.2;
    }
    .hero-stats { display: flex; gap: 10px; }
    .hero-stat {
      background: rgba(255,255,255,0.15);
      border-radius: 12px; padding: 10px 14px; flex: 1;
    }
    .hero-stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 700; color: #fff;
    }
    .hero-stat-label {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px;
    }

    /* ── Conteúdo principal ── */
    #content {
      max-width: 480px; margin: 0 auto;
      padding: 20px 20px 120px; /* espaço extra para o FAB */
    }

    /* ── Seção de título ── */
    .section-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--gray-900); margin-bottom: 12px; margin-top: 24px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── Card de destaque (sessão, mensagens) ── */
    .highlight-card {
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 20px; padding: 18px 20px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none; color: inherit;
    }
    .highlight-card:active { transform: scale(0.98); }
    .highlight-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .highlight-icon {
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .highlight-icon-green { background: #F0FDF4; }
    .highlight-icon-blue  { background: #EFF6FF; }
    .highlight-icon-orange { background: #FFF7ED; }
    .highlight-body { flex: 1; min-width: 0; }
    .highlight-label {
      font-size: 11px; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px;
    }
    .highlight-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--gray-900);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .highlight-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
    .highlight-arrow { color: var(--gray-400); flex-shrink: 0; }
    .highlight-badge {
      background: var(--orange); color: #fff;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      padding: 2px 8px; flex-shrink: 0;
    }

    /* ── Card de ficha de treino ── */
    .workout-card {
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 20px; padding: 18px 20px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s; cursor: pointer;
    }
    .workout-card:active { transform: scale(0.98); }
    .workout-card:hover  { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .workout-icon {
      width: 46px; height: 46px; border-radius: 14px;
      background: #F0FDF4; color: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 20px;
    }
    .workout-info { flex: 1; min-width: 0; }
    .workout-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--gray-900);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
    }
    .workout-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .workout-badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
      background: #F0FDF4; color: var(--green-dark);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .workout-count { font-size: 12px; color: var(--gray-400); }
    .workout-arrow { color: var(--gray-400); flex-shrink: 0; }

    /* ── Estado vazio ── */
    .empty-box {
      text-align: center; padding: 32px 20px;
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 20px; margin-bottom: 10px;
    }
    .empty-box p { font-size: 13px; color: var(--gray-400); line-height: 1.6; }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite; border-radius: 12px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card { height: 82px; border-radius: 20px; margin-bottom: 10px; }

    /* ── Loading inicial ── */
    #loading-screen {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--gray-200); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Info do trainer no rodapé ── */
    #trainer-footer {
      max-width: 480px; margin: 0 auto; padding: 0 20px 100px;
    }
    .trainer-card {
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 20px; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .trainer-card-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .trainer-card-avatar-init {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--green); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .trainer-card-label { font-size: 11px; color: var(--gray-400); margin-bottom: 2px; }
    .trainer-card-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--gray-900);
    }
    .trainer-card-bio { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

    /* ── FAB (botão flutuante para enviar mensagem) ── */
    #fab-msg {
      position: fixed; bottom: 28px; right: 20px;
      bottom: max(28px, env(safe-area-inset-bottom, 28px));
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--green); color: #fff;
      box-shadow: 0 4px 18px rgba(34,197,94,0.45);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; z-index: 100;
      transition: background 0.15s, transform 0.15s;
    }
    #fab-msg:active { transform: scale(0.92); background: var(--green-dark); }
    #fab-msg .fab-badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 20px; height: 20px; padding: 0 5px;
      background: var(--orange); color: #fff; border-radius: 999px;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--gray-50);
    }

    /* ── Modal de envio de mensagem ── */
    #msg-modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #msg-modal-overlay.open { opacity: 1; pointer-events: all; }
    .msg-modal-sheet {
      background: #fff; border-radius: 24px 24px 0 0;
      width: 100%; max-width: 520px;
      padding: 0 0 max(24px, env(safe-area-inset-bottom, 24px));
      transform: translateY(24px);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    #msg-modal-overlay.open .msg-modal-sheet { transform: translateY(0); }
    .msg-modal-handle {
      width: 36px; height: 4px; background: var(--gray-200);
      border-radius: 2px; margin: 12px auto 0;
    }
    .msg-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
    }
    .msg-modal-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px; font-weight: 700; color: var(--gray-900);
    }
    .msg-modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--gray-100); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--gray-600); font-size: 18px; line-height: 1;
    }
    .msg-modal-body { padding: 0 20px 16px; }
    #msg-textarea {
      width: 100%; padding: 12px 14px; border-radius: 16px;
      border: 1.5px solid var(--gray-200); font-size: 14px;
      font-family: 'DM Sans', sans-serif; color: var(--gray-900);
      resize: none; outline: none; min-height: 100px;
      transition: border-color 0.15s;
    }
    #msg-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
    #btn-send-student-msg {
      width: 100%; padding: 14px; border-radius: 16px;
      background: var(--green); color: #fff; border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    #btn-send-student-msg:hover { background: var(--green-dark); }
    #btn-send-student-msg:disabled { background: #BBF7D0; cursor: default; }
    #msg-send-status { font-size: 13px; color: var(--gray-400); margin-top: 10px; text-align: center; min-height: 20px; }

    /* ── Histórico de mensagens no modal ── */
    .msg-preview-list { padding: 0 20px 4px; max-height: 220px; overflow-y: auto; }
    .msg-preview-item {
      padding: 10px 12px; border-radius: 12px; margin-bottom: 6px;
      font-size: 13px; line-height: 1.5; max-width: 85%;
    }
    .msg-preview-trainer {
      background: #F1F5F9; color: var(--gray-900);
      border-bottom-left-radius: 4px;
    }
    .msg-preview-student {
      background: var(--green); color: #fff;
      border-bottom-right-radius: 4px; margin-left: auto;
    }
    .msg-preview-ts { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
    .msg-preview-ts-right { text-align: right; }
    .msg-divider {
      border: none; border-top: 1px solid var(--gray-100);
      margin: 4px 20px 12px;
    }
  </style>
</head>
<body>

<!-- Tela de carregamento inicial -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <p style="font-size:14px;color:#94A3B8;">Carregando sua área...</p>
</div>

<!-- Conteúdo principal -->
<div id="app" style="display:none;">

  <!-- Header -->
  <div id="header">
    <div class="header-inner">
      <div id="trainer-avatar-header"></div>
      <div>
        <div class="header-trainer" id="header-trainer-name"></div>
        <div class="header-brand">FitFlow Pro</div>
      </div>
    </div>
  </div>

  <!-- Hero com saudação personalizada -->
  <div id="hero">
    <div class="hero-inner">
      <div class="hero-greeting" id="hero-greeting">Bom dia! ☀️</div>
      <div class="hero-name" id="hero-student-name">Carregando...</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-value" id="stat-workouts">—</div>
          <div class="hero-stat-label">Fichas ativas</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-value" id="stat-objective">—</div>
          <div class="hero-stat-label">Objetivo</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Conteúdo principal com cards de destaques -->
  <div id="content">

    <!-- Skeletons de carregamento -->
    <div id="loading-state">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card" style="opacity:.7"></div>
      <div class="skeleton skeleton-card" style="opacity:.4"></div>
    </div>

    <!-- Conteúdo carregado -->
    <div id="app-content" style="display:none;">

      <!-- Card: treino ativo do dia -->
      <div id="workout-highlight-section">
        <div class="section-title">Treino de hoje</div>
        <div id="workout-highlight"></div>
      </div>

      <!-- Card: próxima sessão agendada -->
      <div id="appointment-section" style="display:none;">
        <div class="section-title">Próxima sessão</div>
        <div id="appointment-card"></div>
      </div>

      <!-- Card: mensagens não lidas do PT -->
      <div id="messages-section" style="display:none;">
        <div class="section-title">Mensagens do seu PT</div>
        <div id="messages-card"></div>
      </div>

      <!-- Todas as fichas de treino -->
      <div id="workouts-section">
        <div class="section-title" id="workouts-section-title">Minhas fichas</div>
        <div id="workouts-list"></div>
      </div>

    </div>

  </div>

  <!-- Info do trainer no rodapé -->
  <div id="trainer-footer">
    <div class="trainer-card">
      <div id="trainer-card-avatar"></div>
      <div>
        <div class="trainer-card-label">Seu personal trainer</div>
        <div class="trainer-card-name" id="trainer-card-name"></div>
        <div class="trainer-card-bio" id="trainer-card-bio"></div>
      </div>
    </div>
  </div>

</div>

<!-- FAB para enviar mensagem ao PT -->
<button id="fab-msg" aria-label="Enviar mensagem ao personal trainer" style="display:none;">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <span class="fab-badge" id="fab-badge" style="display:none;">0</span>
</button>

<!-- Modal de mensagens -->
<div id="msg-modal-overlay">
  <div class="msg-modal-sheet">
    <div class="msg-modal-handle"></div>
    <div class="msg-modal-header">
      <div class="msg-modal-title">Mensagens</div>
      <button class="msg-modal-close" id="btn-close-msg-modal" aria-label="Fechar">✕</button>
    </div>

    <!-- Histórico de mensagens -->
    <div class="msg-preview-list" id="msg-preview-list"></div>

    <hr class="msg-divider" />

    <!-- Envio de nova mensagem -->
    <div class="msg-modal-body">
      <textarea id="msg-textarea" placeholder="Escreva uma mensagem para seu personal trainer…" rows="3"></textarea>
      <div id="msg-send-status"></div>
      <button id="btn-send-student-msg" style="margin-top:10px;">Enviar mensagem</button>
    </div>
  </div>
</div>


<script>
window.API_BASE_URL = window.location.origin;

const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get('token');

const OBJECTIVE_LABELS = {
  emagrecimento: 'Emagrecimento',
  hipertrofia:   'Hipertrofia',
  condicionamento: 'Condicionamento',
  saude:         'Saúde',
  reabilitacao:  'Reabilitação',
};

const CATEGORY_ICONS = {
  A: '🅰️', B: '🅱️', C: '🅲', D: '🅳', E: '🅴',
  Cardio: '🏃', Funcional: '⚡', Fullbody: '💪', Outro: '📋',
};

const STATUS_APPT = {
  scheduled: 'Agendado',
  confirmed:  'Confirmado',
};

// ── Saudação baseada no horário ──
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia! ☀️';
  if (h < 18) return 'Boa tarde! 🌤️';
  return 'Boa noite! 🌙';
}

// ── Helpers ──
function getInitials(name = '') {
  return name.split(' ').slice(0, 2).map(n => n[0]).join('').toUpperCase();
}

function escHtml(str = '') {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function formatApptDate(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  const today = new Date();
  const diff = Math.floor((d - today) / 86400000);
  const timeStr = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  if (diff < 0)  return `Hoje às ${timeStr}`;
  if (diff === 0) return `Hoje às ${timeStr}`;
  if (diff === 1) return `Amanhã às ${timeStr}`;
  return d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' }) + ` às ${timeStr}`;
}

function relativeTime(isoStr) {
  if (!isoStr) return '';
  const now  = new Date();
  const date = new Date(isoStr);
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60)    return 'agora';
  if (diff < 3600)  return `há ${Math.floor(diff / 60)} min`;
  if (diff < 86400) return `hoje ${date.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`;
  if (diff < 172800) return `ontem`;
  return date.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
}

// ── Carrega dados ──
async function init() {
  if (!TOKEN) {
    showFullError('Link de acesso inválido. Peça um novo link ao seu personal trainer.');
    return;
  }

  try {
    // Carrega dados do aluno, próximas sessões e mensagens em paralelo
    const [studentRes, appointmentsRes, messagesRes] = await Promise.all([
      fetch(`${window.API_BASE_URL}/api/students/public/${TOKEN}`).then(r => r.json()),
      fetch(`${window.API_BASE_URL}/api/appointments/student?access_token=${encodeURIComponent(TOKEN)}`).then(r => r.json()).catch(() => null),
      fetch(`${window.API_BASE_URL}/api/messages/student/preview?access_token=${encodeURIComponent(TOKEN)}`).then(r => r.json()).catch(() => null),
    ]);

    if (!studentRes.success) {
      showFullError(studentRes.message || 'Link de acesso inválido ou expirado.');
      return;
    }

    const student = studentRes.data.student;

    renderHeader(student);
    renderHero(student);
    renderTrainerFooter(student.trainer);
    renderWorkoutHighlight(student.active_workouts || []);
    renderWorkoutList(student.active_workouts || []);

    if (appointmentsRes?.success) {
      renderNextAppointment(appointmentsRes.data.appointments || []);
    }

    if (messagesRes?.success) {
      renderMessages(
        messagesRes.data.messages || [],
        messagesRes.data.unread_count || 0,
      );
    }

    // Exibe app
    document.getElementById('loading-state').style.display  = 'none';
    document.getElementById('app-content').style.display    = 'block';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display            = 'block';
    document.getElementById('fab-msg').style.display        = 'flex';

  } catch (e) {
    showFullError('Erro de conexão. Verifique sua internet e tente novamente.');
  }
}

function renderHeader(student) {
  const trainer = student.trainer;
  document.getElementById('header-trainer-name').textContent = `Personal: ${trainer.name}`;
  const wrap = document.getElementById('trainer-avatar-header');
  wrap.innerHTML = trainer.avatar_url
    ? `<img src="${escHtml(trainer.avatar_url)}" class="trainer-avatar" alt="${escHtml(trainer.name)}" />`
    : `<div class="trainer-avatar-init">${getInitials(trainer.name)}</div>`;
}

function renderHero(student) {
  const firstName = student.name.split(' ')[0];
  document.getElementById('hero-greeting').textContent    = getGreeting();
  document.getElementById('hero-student-name').textContent = `${firstName}!`;
  document.getElementById('stat-workouts').textContent    = (student.active_workouts || []).length;
  document.getElementById('stat-objective').textContent   = OBJECTIVE_LABELS[student.objective] || '—';
  document.title = `Área do aluno — ${student.name}`;
}

function renderTrainerFooter(trainer) {
  document.getElementById('trainer-card-name').textContent = trainer.name;
  const bio = document.getElementById('trainer-card-bio');
  bio.textContent = trainer.bio || '';
  bio.style.display = trainer.bio ? '' : 'none';

  const wrap = document.getElementById('trainer-card-avatar');
  wrap.innerHTML = trainer.avatar_url
    ? `<img src="${escHtml(trainer.avatar_url)}" class="trainer-card-avatar" alt="${escHtml(trainer.name)}" />`
    : `<div class="trainer-card-avatar-init">${getInitials(trainer.name)}</div>`;
}

// Card do treino ativo — mostra a primeira ficha em destaque
function renderWorkoutHighlight(workouts) {
  const section  = document.getElementById('workout-highlight-section');
  const container = document.getElementById('workout-highlight');

  if (!workouts.length) {
    container.innerHTML = `
      <div class="empty-box">
        <p>Seu personal trainer ainda não cadastrou fichas de treino para você.</p>
      </div>`;
    return;
  }

  const w    = workouts[0];
  const icon = CATEGORY_ICONS[w.category] || '💪';
  const count = w.exercise_count != null
    ? `${w.exercise_count} exercício${w.exercise_count !== 1 ? 's' : ''}`
    : '';

  container.innerHTML = `
    <a class="highlight-card"
       href="/frontend/student/workout.html?token=${encodeURIComponent(TOKEN)}&workout=${encodeURIComponent(w.id)}">
      <div class="highlight-icon highlight-icon-green" style="font-size:22px;">${icon}</div>
      <div class="highlight-body">
        <div class="highlight-label">Ficha ${escHtml(w.category || '')} · ${count}</div>
        <div class="highlight-title">${escHtml(w.title)}</div>
        <div class="highlight-sub">Toque para ver os exercícios →</div>
      </div>
    </a>`;
}

// Card de próxima sessão agendada
function renderNextAppointment(appointments) {
  if (!appointments.length) return;

  const next = appointments[0];
  const section = document.getElementById('appointment-section');
  section.style.display = 'block';

  const statusLabel = STATUS_APPT[next.status] || next.status;
  const trainerName = next.trainer?.name || 'Personal trainer';

  document.getElementById('appointment-card').innerHTML = `
    <div class="highlight-card" style="cursor:default;">
      <div class="highlight-icon highlight-icon-blue">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="highlight-body">
        <div class="highlight-label">Com ${escHtml(trainerName)}</div>
        <div class="highlight-title">${formatApptDate(next.starts_at)}</div>
        <div class="highlight-sub">${escHtml(next.location || '')}${next.location ? ' · ' : ''}${escHtml(statusLabel)}</div>
      </div>
    </div>`;
}

// Card de mensagens não lidas
function renderMessages(messages, unreadCount) {
  // Atualiza FAB badge
  const fabBadge = document.getElementById('fab-badge');
  if (unreadCount > 0) {
    fabBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
    fabBadge.style.display = 'flex';
  } else {
    fabBadge.style.display = 'none';
  }

  // Salva mensagens para o modal
  window._chatMessages = messages;

  if (unreadCount === 0 && !messages.length) return;

  // Mostra seção apenas se houver mensagens ou não lidas
  const section = document.getElementById('messages-section');
  section.style.display = 'block';

  const latestTrainerMsg = [...messages].reverse().find(m => m.sender_role === 'trainer');

  if (latestTrainerMsg) {
    document.getElementById('messages-card').innerHTML = `
      <div class="highlight-card" id="open-msg-card">
        <div class="highlight-icon highlight-icon-orange">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="highlight-body">
          <div class="highlight-label">Seu personal trainer</div>
          <div class="highlight-title" style="font-size:13px;font-weight:500;color:#475569;white-space:normal;
               display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
            ${escHtml(latestTrainerMsg.content)}
          </div>
          <div class="highlight-sub">${relativeTime(latestTrainerMsg.created_at)}</div>
        </div>
        ${unreadCount > 0 ? `<span class="highlight-badge">${unreadCount} nova${unreadCount > 1 ? 's' : ''}</span>` : ''}
      </div>`;

    document.getElementById('open-msg-card').addEventListener('click', openMsgModal);
  }
}

// Lista completa de fichas (logo abaixo dos highlights)
function renderWorkoutList(workouts) {
  const container = document.getElementById('workouts-list');
  const title = document.getElementById('workouts-section-title');

  if (workouts.length <= 1) {
    // Só mostra a seção completa se há mais de uma ficha
    if (workouts.length === 0) title.textContent = 'Minhas fichas';
    else title.textContent = 'Todas as fichas';
  }

  if (!workouts.length) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = workouts.map(w => {
    const icon  = CATEGORY_ICONS[w.category] || '📋';
    const count = w.exercise_count != null
      ? `${w.exercise_count} exercício${w.exercise_count !== 1 ? 's' : ''}`
      : '';
    const badge = w.category
      ? `<span class="workout-badge">Ficha ${escHtml(w.category)}</span>`
      : '';

    return `
      <a class="workout-card"
         href="/frontend/student/workout.html?token=${encodeURIComponent(TOKEN)}&workout=${encodeURIComponent(w.id)}">
        <div class="workout-icon">${icon}</div>
        <div class="workout-info">
          <div class="workout-title">${escHtml(w.title)}</div>
          <div class="workout-meta">
            ${badge}
            ${count ? `<span class="workout-count">${count}</span>` : ''}
          </div>
        </div>
        <svg class="workout-arrow" xmlns="http://www.w3.org/2000/svg"
             width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>`;
  }).join('');
}

// ── Modal de mensagens ──
function openMsgModal() {
  renderMsgPreview();
  document.getElementById('msg-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Rola para baixo no preview
  setTimeout(() => {
    const list = document.getElementById('msg-preview-list');
    list.scrollTop = list.scrollHeight;
  }, 50);
}

function closeMsgModal() {
  document.getElementById('msg-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderMsgPreview() {
  const messages = window._chatMessages || [];
  const list = document.getElementById('msg-preview-list');

  if (!messages.length) {
    list.innerHTML = '<p style="font-size:13px;color:#94A3B8;text-align:center;padding:16px 0;">Nenhuma mensagem ainda.</p>';
    return;
  }

  list.innerHTML = messages.slice(-10).map(m => {
    const isTrainer = m.sender_role === 'trainer';
    return `
      <div style="display:flex;flex-direction:column;align-items:${isTrainer ? 'flex-start' : 'flex-end'};margin-bottom:8px;">
        <div class="msg-preview-item ${isTrainer ? 'msg-preview-trainer' : 'msg-preview-student'}">
          ${escHtml(m.content)}
        </div>
        <div class="msg-preview-ts ${isTrainer ? '' : 'msg-preview-ts-right'}">
          ${relativeTime(m.created_at)}
        </div>
      </div>`;
  }).join('');
}

async function sendStudentMessage() {
  const ta     = document.getElementById('msg-textarea');
  const btn    = document.getElementById('btn-send-student-msg');
  const status = document.getElementById('msg-send-status');
  const content = ta.value.trim();

  if (!content) {
    status.textContent = 'Digite uma mensagem antes de enviar.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando…';
  status.textContent = '';

  try {
    const res = await fetch(`${window.API_BASE_URL}/api/messages/student`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: TOKEN, content }),
    });
    const result = await res.json();

    if (result.success) {
      ta.value = '';
      status.textContent = '✓ Mensagem enviada!';
      status.style.color = '#22C55E';
      // Adiciona à lista local
      if (!window._chatMessages) window._chatMessages = [];
      window._chatMessages.push(result.data.message);
      renderMsgPreview();
      setTimeout(() => {
        const list = document.getElementById('msg-preview-list');
        list.scrollTop = list.scrollHeight;
      }, 50);
    } else {
      status.textContent = result.message || 'Erro ao enviar mensagem.';
      status.style.color = '#EF4444';
    }
  } catch (e) {
    status.textContent = 'Erro de conexão.';
    status.style.color = '#EF4444';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar mensagem';
  }
}

function showFullError(msg) {
  document.getElementById('loading-screen').innerHTML = `
    <div style="text-align:center;padding:40px 24px;max-width:320px">
      <div style="font-size:56px;margin-bottom:20px">😕</div>
      <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;
                 font-weight:800;color:#0F172A;margin-bottom:10px">Ops!</h2>
      <p style="font-size:14px;color:#64748B;line-height:1.6">${escHtml(msg)}</p>
    </div>`;
}

// ── Event listeners ──
document.getElementById('fab-msg').addEventListener('click', openMsgModal);
document.getElementById('btn-close-msg-modal').addEventListener('click', closeMsgModal);
document.getElementById('btn-send-student-msg').addEventListener('click', sendStudentMessage);

// Fecha modal ao clicar no overlay
document.getElementById('msg-modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('msg-modal-overlay')) closeMsgModal();
});

// Ctrl+Enter envia, Enter quebra linha na textarea do modal
document.getElementById('msg-textarea').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendStudentMessage(); }
});

init();
</script>
